name: Build & Release

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: |
          docker build -t todo-app:0.1.0 .
          docker tag todo-app:0.1.0 todo-app:latest
          echo "✅ Docker image built: todo-app:0.1.0 and todo-app:latest"

      - name: Create Git tag if it doesn't exist
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "bot@github.com"
          
          # Check if tag exists locally
          if ! git rev-parse v0.1.0 >/dev/null 2>&1; then
            echo "Creating tag v0.1.0..."
            git tag v0.1.0
            git push origin v0.1.0 || echo "Tag might already exist on remote"
          else
            echo "Tag v0.1.0 already exists"
          fi

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="0.1.0"
          TAG="v${VERSION}"
          
          # Try to delete old release if exists (to recreate it)
          gh release delete $TAG --yes 2>/dev/null || true
          
          # Create release
          gh release create $TAG \
            --title "Release v0.1.0 - Initial Feature Release" \
            --notes "## Features Implemented

### 1️⃣ Task Descriptions and Metadata (PR #1)
- Added description field for detailed task information
- Priority levels (0, 1, 2) for task prioritization
- Due date field for task scheduling
- Status tracking (todo/doing/done)
- Automatic timestamps (created_at, updated_at)

### 2️⃣ Search Functionality (PR #2)
- Case-insensitive full-text search across title and description
- Clean search UI with clear button
- Search integrates seamlessly with other features

### 3️⃣ Filtering and Sorting (PR #3)
- Filter tasks by status (todo/doing/done) and priority level (0/1/2)
- Sort by multiple columns: created_at, due_date, priority
- Ascending/descending sort order toggle
- Filters and sorting compose together for flexible task organization

## Technical Stack
- **SemVer Version**: 0.1.0 (MAJOR.MINOR.PATCH)
- **Docker Image**: todo-app:0.1.0 and todo-app:latest
- **Framework**: Flask 3.0.0
- **Database**: SQLite with SQLAlchemy ORM
- **UI**: Bootstrap 5.3.2

## Git Workflow
- Implemented professional branching strategy: main → dev → feature branches
- 3 features implemented and merged via Pull Requests into dev
- Dev branch integrated into main for release
- Clean commit history with meaningful messages" || echo "Release might already exist"
