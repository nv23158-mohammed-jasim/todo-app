name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: |
          docker build -t todo-app:latest .
          echo "Docker image built successfully"

      - name: Create Release
        if: github.event_name == 'push' && contains(github.ref, 'refs/heads/main')
        run: |
          VERSION="0.1.0"
          TAG="v${VERSION}"
          
          # Check if release already exists
          RELEASE=$(gh release list --jq ".[0].tagName" || echo "")
          
          if [ "$RELEASE" != "$TAG" ]; then
            gh release create $TAG \
              --title "Release $TAG" \
              --notes "## Release Features

### 1. Task Descriptions and Metadata
- Added description field for detailed information
- Priority levels (0, 1, 2)
- Due date for scheduling
- Status tracking (todo/doing/done)
- Automatic timestamps

### 2. Search Functionality
- Case-insensitive search by title and description
- Clean search UI with clear button

### 3. Filtering and Sorting
- Filter by status and priority
- Sort by created_at, due_date, or priority
- Ascending/descending toggle

## Technical Details
- SemVer: 0.1.0
- Docker: todo-app:0.1.0
- Framework: Flask 3.0.0
- Database: SQLite with SQLAlchemy"
          else
            echo "Release $TAG already exists"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-tag:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.ref, 'refs/heads/main')
    steps:
      - uses: actions/checkout@v3

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse v0.1.0 >/dev/null 2>&1; then
            echo "TAG_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "TAG_EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.TAG_EXISTS == 'false'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag v0.1.0
          git push origin v0.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
