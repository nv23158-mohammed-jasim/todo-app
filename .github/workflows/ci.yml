name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Run lint
        run: |
          flake8 . \
            --count \
            --max-line-length=120 \
            --exclude=migrations \
            --extend-ignore=E302,F401,W292 \
            --statistics

      - name: Run tests
        run: |
          pytest tests/ -v --cov=app