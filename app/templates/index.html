{% extends "base.html" %}

{% block content %}
<form method="get" class="mb-3">
    <div class="input-group">
        <input name="q" type="text" class="form-control" placeholder="Search tasks..." value="{{ search_query }}">
        <button class="btn btn-primary" type="submit">Search</button>
        {% if search_query %}
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Clear</a>
        {% endif %}
    </div>
</form>
<a href="{{ url_for('create_task') }}" class="btn btn-primary mb-3">New Task</a>
<table class="table">
    <thead><tr><th>ID</th><th>Title</th><th>Description</th><th>Priority</th><th>Due</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>
    {% for t in tasks %}
    <tr>
        <td>{{ t.id }}</td>
        <td>{{ t.title }}</td>
        <td>{{ t.description or '' }}</td>
        <td>{{ t.priority }}</td>
        <td>{{ t.due_date or '' }}</td>
        <td>{{ t.status }}</td>
        <td>
            <a href="{{ url_for('edit_task', task_id=t.id) }}" class="btn btn-sm btn-secondary">Edit</a>
            <form action="{{ url_for('delete_task', task_id=t.id) }}" method="post" style="display:inline">
                <button class="btn btn-sm btn-danger" type="submit">Delete</button>
            </form>
        </td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
